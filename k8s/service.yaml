apiVersion: v1
kind: Service
metadata:
  name: front-login-svc
  namespace: sistal
  labels:
    app: front-login
spec:
  type: ClusterIP
  selector:
    app: front-login
  ports:
  - port: 3000        # Puerto del Service dentro del clúster
    targetPort: 3000  # Puerto del contenedor (NGINX sirviendo React)
    protocol: TCP